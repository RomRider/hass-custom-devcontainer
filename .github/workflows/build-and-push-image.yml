name: Build and Push Image

on:
  workflow_dispatch:
  push:
    paths:
      - Dockerfile
      - requirements.txt
      - bin/**
    branches:
      - master

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Get HA version
      id: get_ha_version
      run: echo "ha_version=$(grep homeassistant requirements.txt | cut -d '=' -f 3)" >> "$GITHUB_OUTPUT"
    - name: Login to docker hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: romrider/hass-custom-devcontainer:latest,romrider/hass-custom-devcontainer:${{ steps.get_ha_version.outputs.ha_version }}
        cache-from: type=gha
        cache-to: type=gha,mode=max